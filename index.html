.filter-pill[data-c="agent"] { background: var(--cat-agent-bg); color: var(--cat-agent); }

.timeline { position: relative; padding-left: 110px; }
.timeline-line {

.month-marker { position: relative; margin-bottom: 2px; }
.month-label {

// State
let activeRole = 'all';
let activeCat = 'all';

// Render filters
function renderFilters() {
  const rf = document.getElementById('role-filters');
  Object.entries(ROLE_LABELS).forEach(([id, label]) => {
    const p = document.createElement('span');
    p.className = 'filter-pill' + (id === 'all' ? ' active' : '');
    p.dataset.r = id;
    if (id !== 'all' && ROLE_SVG[id]) {
      p.innerHTML = '<span class="filter-pill-icon" style="width:14px;height:14px;">' + ROLE_SVG[id] + '</span>' + label;
    } else { p.textContent = label; }
    p.onclick = () => { activeRole = id; updateFilters(); };
    rf.appendChild(p);
  });
  const cf = document.getElementById('cat-filters');
  [{id:'all',label:'Alle'},...Object.entries(CAT_LABELS).map(([id,label])=>({id,label}))].forEach(c => {
    const p = document.createElement('span');
    p.className = 'filter-pill' + (c.id === 'all' ? ' active' : '');
    p.dataset.c = c.id;
    p.textContent = c.label;
    p.onclick = () => { activeCat = c.id; updateFilters(); };
    cf.appendChild(p);
  });
}

function updateFilters() {
  document.querySelectorAll('[data-r]').forEach(p => p.classList.toggle('active', p.dataset.r === activeRole));
  document.querySelectorAll('.filter-pill[data-c]').forEach(p => p.classList.toggle('active', p.dataset.c === activeCat));
  let count = 0;
  document.querySelectorAll('.entry').forEach(e => {
    const matchCat = activeCat === 'all' || e.dataset.c === activeCat;
    const matchRole = activeRole === 'all' || e.dataset.roles.includes(activeRole);
    const show = matchCat && matchRole;
    e.classList.toggle('hidden', !show);
    if (!show) e.classList.remove('open');
    if (show) count++;
  });
  document.getElementById('counter').innerHTML = `<b>${count}</b> von 56 Einträgen sichtbar`;
}

function openModel(name) {
  const m = MODEL_TIMELINES[name]; if (!m) return;
  const panel = document.getElementById('overlay-panel');
  let h = `<span class="overlay-close" onclick="closeOverlay()">&times;</span>`;
  h += `<h3>${name}</h3><p class="overlay-desc">${m.desc}</p>`;
  h += `<table class="model-table"><thead><tr><th>Datum</th><th>Release</th><th>Bedeutung</th></tr></thead><tbody>`;
  m.entries.forEach(e => { h += `<tr><td class="date-col">${e.d}</td><td class="name-col">${e.t}</td><td class="desc-col">${e.h}</td></tr>`; });
  h += '</tbody></table>';
  panel.innerHTML = h;
  document.getElementById('overlay').classList.add('visible');
}
function closeOverlay() { document.getElementById('overlay').classList.remove('visible'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

function renderTimeline() {
  const tl = document.getElementById('tl');
  let lastMonth = '', phaseIdx = 0;

  DATA.forEach(d => {
    while (phaseIdx < PHASES.length && PHASES[phaseIdx].month === d.m) {
      const ph = PHASES[phaseIdx];
      if (d.m !== lastMonth) {
        tl.insertAdjacentHTML('beforeend', `<div class="month-marker"><div class="month-label">${d.m}</div><div class="month-dot"></div></div>`);
        lastMonth = d.m;
      }
      tl.insertAdjacentHTML('beforeend', `<div class="phase"><div class="phase-title">${ph.title}</div><div class="phase-sub">${ph.sub}</div></div>`);
      phaseIdx++;
    }
    if (d.m !== lastMonth) {
      tl.insertAdjacentHTML('beforeend', `<div class="month-marker"><div class="month-label">${d.m}</div><div class="month-dot"></div></div>`);
      lastMonth = d.m;
    }

    const toolChips = d.tool.map(t => `<span class="tool-chip" onclick="event.stopPropagation();openModel('${t}')">${t}</span>`).join(' ');
    const roleDots = d.r.map(r => `<span class="role-icon" data-r="${r}" title="${ROLE_LABELS[r]}" style="width:14px;height:14px;opacity:.55">${ROLE_SVG[r]}</span>`).join('');
    const roleNames = d.r.map(r => ROLE_LABELS[r]).join(', ');

    const el = document.createElement('div');
    el.className = 'entry';
    el.dataset.c = d.c;
    el.dataset.roles = d.r.join(',');
    el.innerHTML = `
      <div class="entry-head">
        <span class="entry-nr">${d.n}</span>
        <span class="entry-title">${d.t}</span>
        <div class="entry-badges">
          <div class="role-icons">${roleDots}</div>
          <span class="cat-tag" data-c="${d.c}">${CAT_LABELS[d.c]}</span>
        </div>
      </div>
      <div class="entry-detail">
        <div class="entry-desc">${d.desc}</div>
        <div class="entry-tools"><span class="entry-tools-label">Tools:</span> ${toolChips}</div>
        <div class="entry-level">${d.l}</div>
        <div class="entry-roles-detail">Relevant für: ${roleNames}</div>
      </div>`;
    el.onclick = () => el.classList.toggle('open');
    tl.appendChild(el);
  });
}

renderFilters();
